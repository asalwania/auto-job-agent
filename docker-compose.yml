services:
  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Next.js App ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/app/storage
    restart: unless-stopped

  # ── BullMQ Workers ────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app-storage:/app/storage
    restart: unless-stopped

volumes:
  redis-data:
  app-storage:
